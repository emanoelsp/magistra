<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">

  <!-- Fundo branco com cantos levemente arredondados -->
  <rect width="32" height="32" rx="7" fill="#ffffff"/>

  <!-- Topo do capelo (losango) -->
  <polygon points="16,4 27.5,10.5 16,17 4.5,10.5" fill="#7c3aed"/>

  <!-- Brilho sutil no topo do capelo -->
  <polygon points="16,4 27.5,10.5 16,10.5 4.5,10.5" fill="#a78bfa" opacity="0.35"/>

  <!-- Corpo cilíndrico do capelo — mais largo e mais alto -->
  <path d="M10.5,16.5 L10.5,22.5 Q10.5,25 16,25 Q21.5,25 21.5,22.5 L21.5,16.5 Z" fill="#7c3aed"/>

  <!-- Aba/borda inferior do cilindro (leve contraste de profundidade) -->
  <ellipse cx="16" cy="25" rx="5.5" ry="1.4" fill="#6d28d9"/>

  <!-- Cordinha da borla: linha a partir do canto direito do losango -->
  <line x1="27.5" y1="10.5" x2="27.5" y2="21.5"
        stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Nó da cordinha (pequeno círculo) -->
  <circle cx="27.5" cy="23.5" r="2.2" fill="#7c3aed"/>

  <!-- Franjas da borla (3 fios finos) -->
  <line x1="25.8" y1="24.5" x2="25.0" y2="28"
        stroke="#7c3aed" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="27.5" y1="25.2" x2="27.5" y2="29"
        stroke="#7c3aed" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="29.2" y1="24.5" x2="30.0" y2="28"
        stroke="#7c3aed" stroke-width="1.1" stroke-linecap="round"/>

</svg>
