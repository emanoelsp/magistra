<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">

  <!-- Fundo branco -->
  <rect width="32" height="32" rx="7" fill="#ffffff"/>

  <!-- Corpo do capelo -->
  <path d="M10,15.5 L10,21.5 Q10,25 16,25 Q22,25 22,21.5 L22,15.5 Z" fill="#5b5ea6"/>

  <!-- Tabuleiro — face inferior (mesma cor do corpo) -->
  <polygon points="16,17.5 27,11 5,11" fill="#5b5ea6"/>

  <!-- Tabuleiro — face superior (lilás claro) -->
  <polygon points="16,4 27,11 5,11" fill="#9090d8"/>

  <!-- Cordinha da borla: curva do canto direito e desce -->
  <path d="M27,11 Q30,11 30,13.5 L30,21" stroke="#5b5ea6" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ponta da borla (miolo em losango) -->
  <polygon points="30,21.5 28.3,24.5 30,27.5 31.7,24.5" fill="#5b5ea6"/>

</svg>
